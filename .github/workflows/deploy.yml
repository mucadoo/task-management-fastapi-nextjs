name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov faker httpx

      - name: Run backend tests
        run: |
          cd backend
          export PYTHONPATH=$PYTHONPATH:.
          pytest --cov=app tests/ --cov-fail-under=70 -v

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Next.js type-check and build
        run: |
          cd frontend
          export NEXT_PUBLIC_API_URL=http://localhost:8000/api
          npm run build

  build-and-push:
    name: Build & Push Docker Images
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/task-manager-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/task-manager-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/task-manager-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/task-manager-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy configuration files
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "mkdir -p ~/task-manager/nginx"
          scp -i ~/.ssh/id_rsa nginx/nginx.conf ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/task-manager/nginx/nginx.conf
          scp -i ~/.ssh/id_rsa docker-compose.prod.yml ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/task-manager/docker-compose.prod.yml

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/task-manager
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "JWT_EXPIRE_MINUTES=${{ secrets.JWT_EXPIRE_MINUTES }}" >> .env
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            echo "IMAGE_TAG=${{ github.sha }}" >> .env
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            SUCCESS=0
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost/api/health; then
                echo "Health check attempt $i passed!"
                SUCCESS=1
                break
              fi
              echo "Health check attempt $i failed, retrying in 10s..."
              sleep 10
            done
            if [ $SUCCESS -eq 1 ]; then
              echo "Deploy successful, running migrations..."
              docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
              echo "Migrations complete. Application is UP."
            else
              echo "Deploy failed: Health check timeout."
              docker compose -f docker-compose.prod.yml logs --tail=100
              exit 1
            fi
          EOF
