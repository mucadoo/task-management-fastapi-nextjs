name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov faker httpx ruff

      - name: Run backend linting
        run: |
          cd backend
          ruff check .

      - name: Run backend tests
        run: |
          cd backend
          export PYTHONPATH=$PYTHONPATH:.
          pytest --cov=app tests/ --cov-fail-under=70 -v

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend linting
        run: |
          cd frontend
          npm run lint

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          npm run test:coverage

      - name: Next.js type-check and build
        run: |
          cd frontend
          export NEXT_PUBLIC_API_URL=http://localhost:8000/api
          npm run build

  terraform:
    name: Infrastructure Provisioning
    runs-on: ubuntu-latest
    outputs:
      instance_ip: ${{ steps.out.outputs.ip }}
      private_key: ${{ steps.out.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Terraform Init
        run: cd terraform && terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      - name: Terraform Apply
        id: apply
        run: |
          cd terraform
          terraform apply -auto-approve -var="aws_region=${{ secrets.AWS_REGION || 'us-east-1' }}" -var="key_name=${{ secrets.KEY_NAME }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      - name: Capture Outputs
        id: out
        run: |
          cd terraform
          echo "ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT
          echo "key<<EOF" >> $GITHUB_OUTPUT
          terraform output -raw private_key >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

  build-and-push:
    name: Build & Push Docker Images
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/task-manager-backend:latest
            ghcr.io/${{ github.repository_owner }}/task-manager-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/task-manager-frontend:latest
            ghcr.io/${{ github.repository_owner }}/task-manager-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: [build-and-push, terraform]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ needs.terraform.outputs.private_key }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.terraform.outputs.instance_ip }} >> ~/.ssh/known_hosts

      - name: Copy configuration files
        run: |
          ssh ubuntu@${{ needs.terraform.outputs.instance_ip }} "mkdir -p ~/task-manager/nginx"
          scp -i ~/.ssh/id_rsa nginx/nginx.conf ubuntu@${{ needs.terraform.outputs.instance_ip }}:~/task-manager/nginx/nginx.conf
          scp -i ~/.ssh/id_rsa docker-compose.prod.yml ubuntu@${{ needs.terraform.outputs.instance_ip }}:~/task-manager/docker-compose.prod.yml

      - name: Deploy via SSH
        run: |
          ssh ubuntu@${{ needs.terraform.outputs.instance_ip }} << 'EOF'
            cd ~/task-manager
            
            JWT_SEC="${{ secrets.JWT_SECRET }}"
            if [ -z "$JWT_SEC" ]; then JWT_SEC=$(openssl rand -hex 32); fi
            
            DB_URL="${{ secrets.DATABASE_URL }}"
            if [ -z "$DB_URL" ]; then DB_URL="postgresql://user:password@db:5432/taskdb"; fi
            
            API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}"
            if [ -z "$API_URL" ]; then API_URL="http://${{ needs.terraform.outputs.instance_ip }}/api/v1"; fi

            echo "ENVIRONMENT=production" > .env
            printf "DATABASE_URL=%s\n" "$DB_URL" >> .env
            printf "JWT_SECRET=%s\n" "$JWT_SEC" >> .env
            printf "NEXT_PUBLIC_API_URL=%s\n" "$API_URL" >> .env
            echo "DOCKER_IMAGE_BASE=ghcr.io/${{ github.repository_owner }}" >> .env
            echo "IMAGE_TAG=${{ github.sha }}" >> .env
            echo "SEED_DB=${{ secrets.SEED_DB || 'false' }}" >> .env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            SUCCESS=0
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost/api/health; then
                echo "Health check attempt $i passed!"
                SUCCESS=1
                break
              fi
              echo "Health check attempt $i failed, retrying in 10s..."
              sleep 10
            done
            
            if [ $SUCCESS -eq 1 ]; then
              echo "Deploy successful, running migrations..."
              docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
              echo "Migrations complete. Application is UP."
            else
              echo "Deploy failed: Health check timeout."
              docker compose -f docker-compose.prod.yml logs --tail=100
              exit 1
            fi
          EOF
