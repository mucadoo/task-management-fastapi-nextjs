version: '3.8'
services:
  backend:
    image: ${DOCKER_USERNAME}/task-manager-backend:${IMAGE_TAG:-latest}
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  frontend:
    image: ${DOCKER_USERNAME}/task-manager-frontend:${IMAGE_TAG:-latest}
    env_file: .env
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped
